services:
  automation:
    build:
      context: .
      dockerfile: Dockerfile
    image: automation-framework:0.1.0
    container_name: automation-framework
    init: true
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AUTOMATION_DINANTIA_STORAGE_STATE_PATH: /app/.playwright/auth/dinantia.json
    volumes:
      - automation_auth:/app/.playwright/auth

  caddy:
    image: caddy:2
    container_name: automation-caddy
    restart: unless-stopped
    depends_on:
      - automation
    environment:
      AUTOMATION_DOMAIN: ${AUTOMATION_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  automation_auth:
  caddy_data:
  caddy_config: