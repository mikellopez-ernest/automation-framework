services:
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    environment:
      AUTOMATION_DOMAIN: ${AUTOMATION_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy

volumes:
  caddy_data:
  caddy_config:

networks:
  proxy:
    external: true